name: Deploy playground to GitHub Pages

# Builds the browser bundle and publishes the playground/ folder to Pages.
# Runs on every push to main, and can be triggered manually.
on:
  push:
    branches: [main]
  workflow_dispatch:

# Permissions required for the deploy-pages action.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deploy; don't cancel an in-progress one.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      # package-lock.json isn't committed, so use `npm install` (not `npm ci`).
      - name: Install dependencies
        run: npm install

      # Rebuilds dist/ and the fresh playground/yaplang.js bundle.
      - name: Build
        run: npm run build

      - name: Upload playground as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: playground

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
