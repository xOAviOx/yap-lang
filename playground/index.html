<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YapLang Playground 🔥</title>
    <style>
      :root {
        --bg: #0d1117;
        --panel: #161b22;
        --panel-2: #11161d;
        --border: #2a313c;
        --text: #e6edf3;
        --muted: #8b949e;
        --accent: #ff7ac6;
        --accent-2: #7ee787;
        --error: #ff7b72;
        --shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
        --mono: ui-monospace, SFMono-Regular, "SF Mono", Menlo, Consolas,
          "Liberation Mono", monospace;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: radial-gradient(
            1200px 600px at 80% -10%,
            rgba(255, 122, 198, 0.12),
            transparent 60%
          ),
          var(--bg);
        color: var(--text);
        font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      header {
        padding: 18px 24px;
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      header h1 {
        font-size: 20px;
        margin: 0;
        letter-spacing: 0.3px;
      }
      header h1 .fire {
        font-weight: 400;
      }
      header .tag {
        color: var(--muted);
        font-size: 13px;
      }
      .spacer {
        flex: 1;
      }
      select,
      button {
        font: inherit;
        border-radius: 10px;
        border: 1px solid var(--border);
        background: var(--panel);
        color: var(--text);
        padding: 9px 14px;
        cursor: pointer;
        transition: transform 0.05s ease, border-color 0.15s ease,
          background 0.15s ease;
      }
      select:hover,
      button:hover {
        border-color: var(--accent);
      }
      button:active {
        transform: translateY(1px);
      }
      button.run {
        background: linear-gradient(135deg, var(--accent), #ff5fb5);
        border: none;
        color: #1a0a14;
        font-weight: 700;
      }
      button.run:hover {
        filter: brightness(1.05);
      }
      main {
        flex: 1;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 1px;
        background: var(--border);
        min-height: 0;
      }
      .pane {
        background: var(--panel-2);
        display: flex;
        flex-direction: column;
        min-height: 0;
      }
      .pane-head {
        padding: 10px 16px;
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 0.12em;
        color: var(--muted);
        border-bottom: 1px solid var(--border);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--accent-2);
        box-shadow: 0 0 10px var(--accent-2);
      }
      textarea {
        flex: 1;
        resize: none;
        border: none;
        outline: none;
        background: transparent;
        color: var(--text);
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.55;
        padding: 16px;
        tab-size: 2;
      }
      #console {
        flex: 1;
        margin: 0;
        padding: 16px;
        overflow: auto;
        font-family: var(--mono);
        font-size: 14px;
        line-height: 1.55;
        white-space: pre-wrap;
        word-break: break-word;
      }
      .line-error {
        color: var(--error);
      }
      .line-meta {
        color: var(--muted);
      }
      .empty {
        color: var(--muted);
        font-style: italic;
      }
      footer {
        padding: 10px 24px;
        border-top: 1px solid var(--border);
        color: var(--muted);
        font-size: 12px;
      }
      footer code {
        color: var(--accent-2);
      }
      @media (max-width: 760px) {
        main {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <header>
      <h1>YapLang <span class="fire">🔥</span></h1>
      <span class="tag">a Gen-Z toy language — runs entirely in your browser</span>
      <span class="spacer"></span>
      <label class="tag" for="examples">load example:</label>
      <select id="examples" aria-label="Load an example"></select>
      <button id="clear" title="Clear the editor">Clear</button>
      <button id="run" class="run" title="Run (Ctrl/Cmd + Enter)">
        Run it 🔥
      </button>
    </header>

    <main>
      <section class="pane">
        <div class="pane-head"><span class="dot"></span> code.yap</div>
        <textarea
          id="editor"
          spellcheck="false"
          autocomplete="off"
          autocapitalize="off"
        ></textarea>
      </section>

      <section class="pane">
        <div class="pane-head"><span class="dot"></span> output</div>
        <pre id="console"></pre>
      </section>
    </main>

    <footer>
      Tip: press <code>Ctrl/Cmd + Enter</code> to run. Variables use
      <code>vibe</code>, print with <code>spill(...)</code>, loop with
      <code>grind</code> / <code>onloop</code>, define functions with
      <code>bestie</code>.
    </footer>

    <script type="module">
      import { run } from "./yaplang.js";

      const EXAMPLES = {
        "👋 hello": `vibe name = "Avi"
vibe age = 21
spill("yo " + name + ", age " + age)
spill("welcome to YapLang fr fr 🔥")`,

        "🔢 fizzbuzz": `grind (vibe i = 1; i <= 20; i = i + 1) {
  fr (i % 15 == 0) {
    spill("FizzBuzz")
  } orfr (i % 3 == 0) {
    spill("Fizz")
  } orfr (i % 5 == 0) {
    spill("Buzz")
  } nah {
    spill(i)
  }
}`,

        "🌀 fibonacci": `bestie fib(n) {
  fr (n < 2) { bet n }
  bet fib(n - 1) + fib(n - 2)
}

grind (vibe i = 0; i < 11; i = i + 1) {
  spill("fib(" + i + ") = " + fib(i))
}`,

        "🧠 logic + loops": `vibe a = nocap
vibe b = cap
fr (a vibin sus b) { spill("logic checks out") }

vibe i = 0
onloop (i < 10) {
  i = i + 1
  fr (i == 3) { skrt }   // continue
  fr (i == 7) { dip }    // break
  spill("count " + i)
}`,

        "📦 arrays": `vibe squad = ["zoomer", "boomer", "doomer"]
spill(squad[0])
squad[1] = "gamer"
slide(squad, "framer")
spill(squad)
spill("size: " + howmany(squad))`,
      };

      const editor = document.getElementById("editor");
      const out = document.getElementById("console");
      const examplesSelect = document.getElementById("examples");
      const runBtn = document.getElementById("run");
      const clearBtn = document.getElementById("clear");

      // Populate the dropdown.
      for (const name of Object.keys(EXAMPLES)) {
        const opt = document.createElement("option");
        opt.value = name;
        opt.textContent = name;
        examplesSelect.appendChild(opt);
      }

      function loadExample(name) {
        editor.value = EXAMPLES[name] ?? "";
      }
      loadExample(Object.keys(EXAMPLES)[0]);

      examplesSelect.addEventListener("change", (e) =>
        loadExample(e.target.value),
      );

      function appendLine(text) {
        const div = document.createElement("div");
        if (text.startsWith("💀") || text.startsWith("⚠️")) {
          div.className = "line-error";
        }
        // Render empty spills as a blank line, not a collapsed element.
        div.textContent = text === "" ? "​" : text;
        out.appendChild(div);
      }

      function runCode() {
        out.innerHTML = "";
        const started = performance.now();
        let printed = 0;
        const result = run(editor.value, (text) => {
          appendLine(text);
          printed++;
        });
        const ms = (performance.now() - started).toFixed(1);

        const meta = document.createElement("div");
        meta.className = "line-meta";
        if (printed === 0 && result.ok) {
          meta.textContent = `— ran clean in ${ms}ms (nothing spilled) —`;
        } else {
          meta.textContent = result.ok
            ? `— done in ${ms}ms —`
            : `— stopped on an error in ${ms}ms —`;
        }
        out.appendChild(meta);
        out.scrollTop = out.scrollHeight;
      }

      runBtn.addEventListener("click", runCode);
      clearBtn.addEventListener("click", () => {
        editor.value = "";
        editor.focus();
      });

      // Ctrl/Cmd + Enter to run.
      editor.addEventListener("keydown", (e) => {
        if ((e.metaKey || e.ctrlKey) && e.key === "Enter") {
          e.preventDefault();
          runCode();
        }
        // Insert two spaces on Tab instead of leaving the textarea.
        if (e.key === "Tab") {
          e.preventDefault();
          const s = editor.selectionStart;
          const end = editor.selectionEnd;
          editor.value =
            editor.value.slice(0, s) + "  " + editor.value.slice(end);
          editor.selectionStart = editor.selectionEnd = s + 2;
        }
      });

      // Run the first example on load so the page feels alive.
      runCode();
    </script>
  </body>
</html>
